# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Publish Web
run-name: Publish Web ${{ inputs.publish_type }}

on:
  workflow_dispatch:
    inputs:
      publish_type:
        description: 'Publish Options'
        required: true
        default: 'Initial Release'
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.version.outputs.version }}
      tag_version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ inputs.publish_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-web" ]]; then
            echo "==================================="
            echo "[!] Can only publish from the 'rc' or 'hotfix-rc-web' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/web/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=web-v$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

  self-host:
    name: Release self-host docker
    runs-on: ubuntu-24.04
    needs: setup
    permissions:
      contents: read
      deployments: write
    env:
      _BRANCH_NAME: ${{ github.ref_name }}
      _RELEASE_VERSION: ${{ needs.setup.outputs.release_version }}
      _RELEASE_OPTION: ${{ inputs.publish_type }}
    steps:
      - name: Print environment
        run: |
          whoami
          docker --version
          echo "GitHub ref: $GITHUB_REF"
          echo "GitHub event: $GITHUB_EVENT"
          echo "Github Release Option: $_RELEASE_OPTION"

      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: '[MOCK] Login to Azure - PROD Subscription'
        run: echo "[MOCK] Skipping Azure login (no real credentials)"

      - name: '[MOCK] Login to Azure ACR'
        run: echo "[MOCK] Skipping az acr login -n bitwardenprod"

      - name: Create GitHub deployment
        if: ${{ inputs.publish_type != 'Dry Run' }}
        uses: chrnorm/deployment-action@55729fcebec3d284f60f5bcabbd8376437d696b1 # v2.0.7
        id: deployment
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          initial-status: 'in_progress'
          environment-url: http://vault.bitwarden.com
          environment: 'Web Vault - US Production Cloud'
          description: 'Deployment ${{ needs.setup.outputs.release_version }} from branch ${{ github.ref_name }}'
          task: release

      - name: '[MOCK] Pull branch image'
        run: |
          if [[ "${{ inputs.publish_type }}" == "Dry Run" ]]; then
            echo "[MOCK] docker pull bitwardenprod.azurecr.io/web:latest"
          else
            echo "[MOCK] docker pull bitwardenprod.azurecr.io/web:$_BRANCH_NAME"
          fi

      - name: '[MOCK] Tag version'
        run: |
          if [[ "${{ inputs.publish_type }}" == "Dry Run" ]]; then
            echo "[MOCK] docker tag .../web:latest .../web:dryrun"
            echo "[MOCK] docker tag .../web:latest .../web-sh:dryrun"
          else
            echo "[MOCK] docker tag .../web:$_BRANCH_NAME .../web:$_RELEASE_VERSION"
            echo "[MOCK] docker tag .../web:$_BRANCH_NAME .../web-sh:$_RELEASE_VERSION"
            echo "[MOCK] docker tag .../web:$_BRANCH_NAME .../web:latest"
            echo "[MOCK] docker tag .../web:$_BRANCH_NAME .../web-sh:latest"
          fi

      - name: '[MOCK] Push version'
        run: |
          if [[ "${{ inputs.publish_type }}" == "Dry Run" ]]; then
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web:dryrun"
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web-sh:dryrun"
          else
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web:$_RELEASE_VERSION"
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web-sh:$_RELEASE_VERSION"
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web:latest"
            echo "[MOCK] docker push bitwardenprod.azurecr.io/web-sh:latest"
          fi

      - name: Update deployment status to Success
        if: ${{ inputs.publish_type != 'Dry Run' && success() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          environment-url: http://vault.bitwarden.com
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status to Failure
        if: ${{ inputs.publish_type != 'Dry Run' && failure() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          environment-url: http://vault.bitwarden.com
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: '[MOCK] Log out of Docker'
        run: echo "[MOCK] docker logout"

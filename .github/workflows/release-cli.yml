# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Release CLI
run-name: Release CLI ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Options'
        required: true
        default: 'Initial Release'
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run

defaults:
  run:
    working-directory: apps/cli

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-cli" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'rc' or 'hotfix-rc-cli' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/cli/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - name: Download all build-cli artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.release_type }}" = "Dry Run" ]; then
            BRANCH="main"
          else
            BRANCH="$GITHUB_REF_NAME"
          fi
          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-cli.yml \
            --branch "$BRANCH" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful build-cli run found on branch $BRANCH"
            exit 1
          fi
          echo "Downloading artifacts from run $RUN_ID (branch: $BRANCH)"
          mkdir -p apps/cli
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --dir apps/cli/
          find apps/cli -mindepth 2 -type f -exec mv {} apps/cli/ \;
          find apps/cli -mindepth 1 -type d -empty -delete
          ls apps/cli/

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/apps/cli
        env:
          PKG_VERSION: ${{ needs.setup.outputs.release-version }}
        run: |
          for f in \
            bw-oss-windows-${PKG_VERSION}.zip \
            bw-windows-${PKG_VERSION}.zip \
            bw-oss-macos-${PKG_VERSION}.zip \
            bw-macos-${PKG_VERSION}.zip \
            bw-oss-linux-${PKG_VERSION}.zip \
            bw-linux-${PKG_VERSION}.zip; do
            [ -f "$f" ] && sha256sum "$f" | awk '{print $1}' > "${f%.zip}-sha256-${PKG_VERSION}.txt"
          done
          [ -f "bw_${PKG_VERSION}_amd64.snap" ] && \
            sha256sum "bw_${PKG_VERSION}_amd64.snap" | awk '{print $1}' > "bw-snap-sha256-${PKG_VERSION}.txt"

      - name: Create release
        if: ${{ inputs.release_type != 'Dry Run' }}
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        env:
          PKG_VERSION: ${{ needs.setup.outputs.release-version }}
        with:
          artifacts: |
            apps/cli/bw-oss-windows-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-windows-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-windows-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-windows-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-oss-macos-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-macos-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-macos-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-macos-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-oss-linux-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-linux-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-linux-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-linux-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bitwarden-cli.${{ env.PKG_VERSION }}.nupkg,
            apps/cli/bw_${{ env.PKG_VERSION }}_amd64.snap,
            apps/cli/bw-snap-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bitwarden-cli-${{ env.PKG_VERSION }}-npm-build.zip
          commit: ${{ github.sha }}
          tag: cli-v${{ env.PKG_VERSION }}
          name: CLI v${{ env.PKG_VERSION }}
          body: "<insert release notes here>"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

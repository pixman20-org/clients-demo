# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Release CLI
run-name: Release CLI ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Options'
        required: true
        default: 'Initial Release'
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run

defaults:
  run:
    working-directory: apps/cli

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-cli" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'rc' or 'hotfix-rc-cli' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/cli/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - name: '[MOCK] Download all Release artifacts'
        if: ${{ inputs.release_type != 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-cli.yml on branch ${{ github.ref_name }}"
          mkdir -p apps/cli
          PKG_VERSION="${{ needs.setup.outputs.release-version }}"
          echo "mock" > apps/cli/bw-oss-windows-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-windows-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-windows-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-windows-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-oss-macos-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-macos-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-macos-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-macos-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-oss-linux-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-linux-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-linux-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-linux-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bitwarden-cli.${PKG_VERSION}.nupkg
          echo "mock" > apps/cli/bw_${PKG_VERSION}_amd64.snap
          echo "mock" > apps/cli/bw-snap-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bitwarden-cli-${PKG_VERSION}-npm-build.zip

      - name: '[MOCK] Dry Run - Download all artifacts'
        if: ${{ inputs.release_type == 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-cli.yml on branch main"
          mkdir -p apps/cli
          PKG_VERSION="${{ needs.setup.outputs.release-version }}"
          echo "mock" > apps/cli/bw-oss-windows-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-windows-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-windows-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-windows-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-oss-macos-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-macos-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-macos-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-macos-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-oss-linux-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-oss-linux-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bw-linux-${PKG_VERSION}.zip
          echo "mock" > apps/cli/bw-linux-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bitwarden-cli.${PKG_VERSION}.nupkg
          echo "mock" > apps/cli/bw_${PKG_VERSION}_amd64.snap
          echo "mock" > apps/cli/bw-snap-sha256-${PKG_VERSION}.txt
          echo "mock" > apps/cli/bitwarden-cli-${PKG_VERSION}-npm-build.zip

      - name: Create release
        if: ${{ inputs.release_type != 'Dry Run' }}
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        env:
          PKG_VERSION: ${{ needs.setup.outputs.release-version }}
        with:
          artifacts: |
            apps/cli/bw-oss-windows-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-windows-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-windows-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-windows-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-oss-macos-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-macos-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-macos-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-macos-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-oss-linux-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-oss-linux-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bw-linux-${{ env.PKG_VERSION }}.zip,
            apps/cli/bw-linux-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bitwarden-cli.${{ env.PKG_VERSION }}.nupkg,
            apps/cli/bw_${{ env.PKG_VERSION }}_amd64.snap,
            apps/cli/bw-snap-sha256-${{ env.PKG_VERSION }}.txt,
            apps/cli/bitwarden-cli-${{ env.PKG_VERSION }}-npm-build.zip
          commit: ${{ github.sha }}
          tag: cli-v${{ env.PKG_VERSION }}
          name: CLI v${{ env.PKG_VERSION }}
          body: "<insert release notes here>"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

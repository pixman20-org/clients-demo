# Mock workflow: echoes Docker build/push/sign/scan and external API calls instead of actually building.
# This workflow will run in the context of the source of the PR.
# On a PR from a fork, the workflow will not have access to secrets, and so any parts of the build
# that require secrets will not run. If additional artifacts are needed, the failed
# "build-web-target.yml" workflow held up by the check-run should be re-run.

name: Build Web

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'l10n_master'
      - 'cf-pages'
    paths:
      - 'apps/web/**'
      - 'bitwarden_license/bit-common/**'
      - 'bitwarden_license/bit-web/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-web.yml'
  push:
    branches:
      - 'main'
      - 'rc'
      - 'hotfix-rc-web'
    paths:
      - 'apps/web/**'
      - 'bitwarden_license/bit-common/**'
      - 'bitwarden_license/bit-web/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-web.yml'
  release:
    types: [published]
  workflow_call:
    inputs: {}
  workflow_dispatch:
    inputs:
      custom_tag_extension:
        description: "Custom image tag extension"
        required: false
      sdk_branch:
        description: "Custom SDK branch"
        required: false
        type: string

env:
  _AZ_REGISTRY: mock-registry.azurecr.io
  _GHCR_REGISTRY: ghcr.io/pixman20-org
  _GITHUB_PR_REPO_NAME: ${{ github.event.pull_request.head.repo.full_name }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}
      node_version: ${{ steps.retrieve-node-version.outputs.node_version }}
      has_secrets: ${{ steps.check-secrets.outputs.has_secrets }}
    steps:
      - name: Log inputs to job summary
        env:
          INPUTS: ${{ toJson(inputs) }}
        run: |
          echo "<details><summary>Job Inputs</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "${INPUTS}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get GitHub sha as version
        id: version
        run: echo "value=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Get Node Version
        id: retrieve-node-version
        run: |
          NODE_NVMRC=$(cat .nvmrc 2>/dev/null || echo "20")
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check secrets
        id: check-secrets
        run: |
          has_secrets=${{ secrets.DEMO_CLIENT_ID != '' }}
          echo "has_secrets=$has_secrets" >> "$GITHUB_OUTPUT"


  build-containers:
    name: "Build [${{matrix.artifact_name}}], image tag: [${{matrix.image_name}}]"
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      id-token: write
      packages: write
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: selfhosted-open-source
            license_type: "oss"
            image_name: web-oss
            npm_command: dist:oss:selfhost
          - artifact_name: cloud-COMMERCIAL
            license_type: "commercial"
            image_name: web-cloud
            npm_command: dist:bit:cloud
          - artifact_name: selfhosted-COMMERCIAL
            license_type: "commercial"
            image_name: web
            npm_command: dist:bit:selfhost
          - artifact_name: selfhosted-DEV
            license_type: "commercial"
            image_name: web-dev
            npm_command: build:bit:selfhost:dev
            git_metadata: true
          - artifact_name: cloud-QA
            license_type: "commercial"
            image_name: web-qa-cloud
            npm_command: build:bit:qa
            git_metadata: true
          - artifact_name: ee
            license_type: "commercial"
            image_name: web-ee
            npm_command: build:bit:ee
            git_metadata: true
          - artifact_name: cloud-euprd
            license_type: "commercial"
            image_name: web-euprd
            npm_command: build:bit:euprd
          - artifact_name: cloud-euqa
            license_type: "commercial"
            image_name: web-euqa
            npm_command: build:bit:euqa
            git_metadata: true
          - artifact_name: cloud-usdev
            license_type: "commercial"
            image_name: web-usdev
            npm_command: build:bit:usdev
            git_metadata: true
    env:
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      _VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get Latest Server Version
        id: latest-server-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/pixman20-org/server-demo/releases/latest --jq '.tag_name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest server release version: $VERSION"

      - name: Set Server Ref
        id: set-server-ref
        env:
          _SERVER_VERSION: ${{ steps.latest-server-version.outputs.version }}
        run: |
          SERVER_REF="$_SERVER_VERSION"
          echo "Latest server release version: $SERVER_REF"
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            SERVER_REF="$GITHUB_REF"
          elif [[ "$GITHUB_REF" == "refs/heads/rc" ]]; then
            SERVER_REF="$GITHUB_REF"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            SERVER_REF="refs/heads/main"
          fi
          echo "Server ref: $SERVER_REF"
          echo "server_ref=$SERVER_REF" >> "$GITHUB_OUTPUT"

      - name: Check out Server repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: server
          repository: pixman20-org/server-demo
          ref: ${{ steps.set-server-ref.outputs.server_ref }}
          persist-credentials: false

      - name: "[MOCK] Download SDK Artifacts"
        if: ${{ inputs.sdk_branch != '' && matrix.license_type != 'commercial' }}
        run: |
          echo "[MOCK] Would download sdk-internal artifacts from sdk-internal repo branch: ${{ inputs.sdk_branch }}"

      - name: "[MOCK] Download Commercial SDK Artifacts"
        if: ${{ inputs.sdk_branch != '' && matrix.license_type == 'commercial' }}
        run: |
          echo "[MOCK] Would download commercial-sdk-internal artifacts from sdk-internal repo branch: ${{ inputs.sdk_branch }}"

      - name: Check Branch to Publish
        env:
          PUBLISH_BRANCHES: "main,rc,hotfix-rc-web"
        id: publish-branch-check
        run: |
          IFS="," read -a publish_branches <<< "$PUBLISH_BRANCHES"

          if [[ " ${publish_branches[*]} " =~ " ${GITHUB_REF:11} " ]]; then
            echo "is_publish_branch=true" >> "$GITHUB_ENV"
          else
            echo "is_publish_branch=false" >> "$GITHUB_ENV"
          fi

      - name: Add Git metadata to build version
        working-directory: apps/web
        if: matrix.git_metadata
        run: |
          VERSION=$( jq -r ".version" package.json)
          jq --arg version "$VERSION+${GITHUB_SHA:0:7}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: "[MOCK] Log in to Azure"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log in to Azure with OIDC"

      - name: "[MOCK] Log into container registry"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log in to ${_AZ_REGISTRY} via az acr login"

      - name: "[MOCK] Log in to GHCR"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log in to ghcr.io as ${{ github.actor }}"

      - name: Generate container image tag
        id: tag
        env:
          _TAG_EXTENSION: ${{ github.event.inputs.custom_tag_extension }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            IMAGE_TAG=$(echo "${GITHUB_HEAD_REF}" | sed "s/[^a-zA-Z0-9]/-/g")
          else
            IMAGE_TAG=$(echo "${GITHUB_REF_NAME}" | sed "s#/#-#g")
          fi

          if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            SANITIZED_REPO_NAME=$(echo "$_GITHUB_PR_REPO_NAME" | sed "s/[^a-zA-Z0-9]/-/g")
            IMAGE_TAG="$SANITIZED_REPO_NAME-$IMAGE_TAG"
            IMAGE_TAG=${IMAGE_TAG:0:128}
          fi

          if [[ "$IMAGE_TAG" == "main" ]]; then
            IMAGE_TAG=dev
          fi

          TAG_EXTENSION="$_TAG_EXTENSION"

          if [[ $TAG_EXTENSION ]]; then
            IMAGE_TAG="$IMAGE_TAG-$TAG_EXTENSION"
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate image full name
        id: image-name
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          PROJECT_NAME: ${{ matrix.image_name }}
        run: |
          ACR_NAME="$_AZ_REGISTRY/${PROJECT_NAME}:${IMAGE_TAG}"
          GHCR_NAME="$_GHCR_REGISTRY/${PROJECT_NAME}:${IMAGE_TAG}"
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "ghcr_name=$GHCR_NAME" >> "$GITHUB_OUTPUT"
          echo "tags=$ACR_NAME,$GHCR_NAME" >> "$GITHUB_OUTPUT"

      - name: "[MOCK] Build Docker image"
        id: build-container
        env:
          IMAGE_NAME: ${{ steps.image-name.outputs.name }}
          NPM_COMMAND: ${{ matrix.npm_command }}
          LICENSE_TYPE: ${{ matrix.license_type }}
        run: |
          echo "[MOCK] Would build multi-platform Docker image (linux/amd64, linux/arm/v7, linux/arm64)"
          echo "[MOCK]   Image: ${IMAGE_NAME}"
          echo "[MOCK]   NPM command: ${NPM_COMMAND}"
          echo "[MOCK]   License type: ${LICENSE_TYPE}"
          echo "[MOCK]   Node version: ${_NODE_VERSION}"
          echo "digest=sha256:mock$(echo "${IMAGE_NAME}" | md5sum | head -c 32)0000000000000000" >> "$GITHUB_OUTPUT"

      - name: "[MOCK] Push images"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        env:
          TAGS: ${{ steps.image-name.outputs.tags }}
        run: |
          IFS=',' read -r -a tags_array <<< "$TAGS"
          for tag in "${tags_array[@]}"; do
            echo "[MOCK] Would push: $tag"
          done

      - name: "[MOCK] Zip project"
        working-directory: apps/web
        env:
          IMAGE_NAME: ${{ steps.image-name.outputs.name }}
        run: |
          echo "[MOCK] Would extract build artifacts from ${IMAGE_NAME} and zip to web-${_VERSION}-${{ matrix.artifact_name }}.zip"
          mkdir -p build
          echo "mock build output" > build/index.html
          zip -r web-${_VERSION}-${{ matrix.artifact_name }}.zip build

      - name: Upload ${{ matrix.artifact_name }} artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: web-${{ env._VERSION }}-${{ matrix.artifact_name }}.zip
          path: apps/web/web-${{ env._VERSION }}-${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      - name: "[MOCK] Install Cosign"
        if: github.event_name != 'pull_request_target' && env.is_publish_branch == 'true'
        run: echo "[MOCK] Would install cosign for image signing"

      - name: "[MOCK] Sign image with Cosign"
        if: github.event_name != 'pull_request_target' && env.is_publish_branch == 'true'
        env:
          DIGEST: ${{ steps.build-container.outputs.digest }}
          TAGS: ${{ steps.image-name.outputs.tags }}
        run: |
          IFS=',' read -r -a tags_array <<< "${TAGS}"
          for tag in "${tags_array[@]}"; do
            echo "[MOCK] Would sign: ${tag}@${DIGEST}"
          done

      - name: "[MOCK] Scan Docker image"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        id: container-scan
        run: |
          echo "[MOCK] Would run Anchore Grype scan on ${{ steps.image-name.outputs.name }}"
          echo "[MOCK] Would upload SARIF results to GitHub Security tab"

      - name: "[MOCK] Log out of Docker"
        run: |
          echo "[MOCK] Would docker logout ${_AZ_REGISTRY}"
          echo "[MOCK] Would docker logout ghcr.io"

      - name: "[MOCK] Log out from Azure"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log out from Azure"


  crowdin-push:
    name: Crowdin Push
    if: github.event_name != 'pull_request_target' && github.ref == 'refs/heads/main'
    needs: build-containers
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: "[MOCK] Log in to Azure"
        run: echo "[MOCK] Would log in to Azure with OIDC"

      - name: "[MOCK] Retrieve Crowdin API token"
        id: retrieve-secrets
        run: |
          echo "[MOCK] Would retrieve crowdin-api-token from demo-kv-ci"
          echo "crowdin-api-token=mock-crowdin-token" >> "$GITHUB_OUTPUT"

      - name: "[MOCK] Log out from Azure"
        run: echo "[MOCK] Would log out from Azure"

      - name: "[MOCK] Upload Sources to Crowdin"
        run: |
          echo "[MOCK] Would upload localization sources to Crowdin project 308189"
          echo "[MOCK] Config: apps/web/crowdin.yml, branch: main"


  cd-web:
    name: CD Web
    needs: build-containers
    if: |
      github.event_name != 'pull_request_target'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc' || github.ref == 'refs/heads/hotfix-rc-web')
    uses: ./.github/workflows/cd-web.yml
    secrets: inherit


  check-failures:
    name: Check for failures
    if: always()
    runs-on: ubuntu-24.04
    needs:
      - setup
      - build-containers
      - crowdin-push
      - cd-web
    permissions:
      id-token: write
    steps:
      - name: Check if any job failed
        if: |
          github.event_name != 'pull_request_target'
          && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc' || github.ref == 'refs/heads/hotfix-rc-web')
          && contains(needs.*.result, 'failure')
        run: exit 1

      - name: "[MOCK] Log in to Azure"
        if: failure()
        run: echo "[MOCK] Would log in to Azure with OIDC"

      - name: "[MOCK] Retrieve Slack webhook URL"
        id: retrieve-secrets
        if: failure()
        run: |
          echo "[MOCK] Would retrieve demo-alerts-slack-webhook-url from demo-kv-ci"
          echo "demo-alerts-slack-webhook-url=mock-webhook" >> "$GITHUB_OUTPUT"

      - name: "[MOCK] Log out from Azure"
        if: failure()
        run: echo "[MOCK] Would log out from Azure"

      - name: "[MOCK] Notify Slack on failure"
        if: failure()
        run: echo "[MOCK] Would post failure notification to demo-alerts Slack channel"

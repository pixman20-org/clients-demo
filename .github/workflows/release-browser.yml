# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Release Browser
run-name: Release Browser ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Options'
        required: true
        default: 'Initial Release'
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-browser" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'rc' or 'hotfix-rc-browser' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/browser/src/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

  locales-test:
    name: Locales Test
    runs-on: ubuntu-24.04
    needs: setup
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Testing locales - extName length
        run: |
          found_error=false

          echo "Locales Test"
          echo "============"
          echo "extName string must be 40 characters or less"
          echo
          for locale in $(ls src/_locales/); do
            string_length=$(jq '.extName.message | length' src/_locales/$locale/messages.json)
            if [[ $string_length -gt 40 ]]; then
              echo "$locale: $string_length"
              found_error=true
            fi
          done

          if $found_error; then
            echo
            echo "Please fix 'extName' for the locales listed above."
            exit 1
          else
            echo "Test passed!"
          fi
        working-directory: apps/browser

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - setup
      - locales-test
    steps:
      - name: Download latest build-browser artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "Dry Run" ]; then
            BRANCH="main"
          else
            BRANCH="$GITHUB_REF_NAME"
          fi
          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-browser.yml \
            --branch "$BRANCH" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful build-browser run found on branch $BRANCH"
            exit 1
          fi
          echo "Downloading artifacts from run $RUN_ID (branch: $BRANCH)"
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "browser-source-*" \
            --pattern "dist-chrome-MV3-*" \
            --pattern "dist-opera-MV3-*" \
            --pattern "dist-firefox-*" \
            --pattern "dist-edge-MV3-*" \
            --dir artifacts/
          find artifacts -mindepth 2 -type f -exec mv {} . \;
          find artifacts -mindepth 1 -type d -empty -delete
          ls .

      - name: Rename build artifacts
        env:
          PACKAGE_VERSION: ${{ needs.setup.outputs.release-version }}
        run: |
          mv browser-source-*.zip browser-source-$PACKAGE_VERSION.zip
          mv dist-chrome-MV3-*.zip dist-chrome-$PACKAGE_VERSION.zip
          mv dist-opera-MV3-*.zip dist-opera-$PACKAGE_VERSION.zip
          mv dist-firefox-*.zip dist-firefox-$PACKAGE_VERSION.zip
          mv dist-edge-MV3-*.zip dist-edge-$PACKAGE_VERSION.zip

      - name: Create release
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        with:
          artifacts: |
            browser-source-${{ needs.setup.outputs.release-version }}.zip,
            dist-chrome-${{ needs.setup.outputs.release-version }}.zip,
            dist-opera-${{ needs.setup.outputs.release-version }}.zip,
            dist-firefox-${{ needs.setup.outputs.release-version }}.zip,
            dist-edge-${{ needs.setup.outputs.release-version }}.zip
          commit: ${{ github.sha }}
          tag: "browser-v${{ needs.setup.outputs.release-version }}"
          name: "Browser v${{ needs.setup.outputs.release-version }}"
          body: "<insert release notes here>"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Publish CLI
run-name: Publish CLI ${{ inputs.publish_type }}

on:
  workflow_dispatch:
    inputs:
      publish_type:
        description: 'Publish Options'
        required: true
        default: 'Initial Publish'
        type: choice
        options:
          - Initial Publish
          - Republish
          - Dry Run
      version:
        description: 'Version to publish (default: latest cli release)'
        required: true
        type: string
        default: latest
      snap_publish:
        description: 'Publish to Snap store'
        required: true
        default: true
        type: boolean
      choco_publish:
        description: 'Publish to Chocolatey store'
        required: true
        default: true
        type: boolean
      npm_publish:
        description: 'Publish to npm registry'
        required: true
        default: true
        type: boolean

defaults:
  run:
    working-directory: apps/cli

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version-output.outputs.version }}
      deployment-id: ${{ steps.deployment.outputs.deployment_id }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Branch check
        if: ${{ inputs.publish_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-cli" ]]; then
            echo "==================================="
            echo "[!] Can only publish from the 'rc' or 'hotfix-rc-cli' branches"
            echo "==================================="
            exit 1
          fi

      - name: Version output
        id: version-output
        run: |
          if [[ "${{ inputs.version }}" == "latest" || "${{ inputs.version }}" == "" ]]; then
            VERSION=$(curl "https://api.github.com/repos/pixman20-org/clients-demo/releases" | jq -c '.[] | select(.tag_name | contains("cli")) | .tag_name' | head -1 | grep -ohE '20[0-9]{2}\.([1-9]|1[0-2])\.[0-9]+')
            echo "Latest Released Version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "Release Version: ${{ inputs.version }}"
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub deployment
        if: ${{ inputs.publish_type != 'Dry Run' }}
        uses: chrnorm/deployment-action@55729fcebec3d284f60f5bcabbd8376437d696b1 # v2.0.7
        id: deployment
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          initial-status: 'in_progress'
          environment: 'CLI - Production'
          description: 'Deployment ${{ steps.version-output.outputs.version }} from branch ${{ github.ref_name }}'
          task: release

  snap:
    name: Deploy Snap
    runs-on: ubuntu-24.04
    needs: setup
    if: inputs.snap_publish
    env:
      _PKG_VERSION: ${{ needs.setup.outputs.release-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: '[MOCK] Login to Azure'
        run: echo "[MOCK] Skipping Azure login (no real credentials)"

      - name: '[MOCK] Retrieve secrets'
        run: echo "[MOCK] Skipping secret retrieval from Azure Key Vault"

      - name: '[MOCK] Download Snap artifact'
        run: echo "[MOCK] Skipping download of bw_${{ env._PKG_VERSION }}_amd64.snap from GitHub release"

      - name: '[MOCK] Publish Snap & logout'
        if: ${{ inputs.publish_type != 'Dry Run' }}
        run: |
          echo "[MOCK] snapcraft upload bw_${{ env._PKG_VERSION }}_amd64.snap --release stable"
          echo "[MOCK] snapcraft logout"

  choco:
    name: Deploy Choco
    runs-on: ubuntu-24.04
    needs: setup
    if: inputs.choco_publish
    env:
      _PKG_VERSION: ${{ needs.setup.outputs.release-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: '[MOCK] Login to Azure'
        run: echo "[MOCK] Skipping Azure login (no real credentials)"

      - name: '[MOCK] Retrieve secrets'
        run: echo "[MOCK] Skipping secret retrieval from Azure Key Vault"

      - name: '[MOCK] Setup Chocolatey'
        run: echo "[MOCK] choco apikey --key <secret> --source https://push.chocolatey.org/"

      - name: '[MOCK] Download Chocolatey artifact'
        run: echo "[MOCK] Skipping download of bitwarden-cli.${{ env._PKG_VERSION }}.nupkg from GitHub release"

      - name: '[MOCK] Push to Chocolatey'
        if: ${{ inputs.publish_type != 'Dry Run' }}
        run: echo "[MOCK] choco push --source=https://push.chocolatey.org/"

  npm:
    name: Publish NPM
    runs-on: ubuntu-24.04
    needs: setup
    if: inputs.npm_publish
    env:
      _PKG_VERSION: ${{ needs.setup.outputs.release-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: '[MOCK] Login to Azure'
        run: echo "[MOCK] Skipping Azure login (no real credentials)"

      - name: '[MOCK] Retrieve secrets'
        run: echo "[MOCK] Skipping secret retrieval from Azure Key Vault"

      - name: '[MOCK] Download and set up artifact'
        run: |
          echo "[MOCK] Skipping download of bitwarden-cli-${{ env._PKG_VERSION }}-npm-build.zip from GitHub release"
          mkdir -p build

      - name: '[MOCK] Setup NPM'
        run: echo "[MOCK] Skipping npm registry auth token setup"

      - name: Install Husky
        run: npm install -g husky

      - name: '[MOCK] Publish NPM'
        if: ${{ inputs.publish_type != 'Dry Run' }}
        run: echo "[MOCK] npm publish --access public --registry=https://registry.npmjs.org/"

  update-deployment:
    name: Update Deployment Status
    runs-on: ubuntu-24.04
    needs:
      - setup
      - npm
      - snap
      - choco
    if: ${{ always() && inputs.publish_type != 'Dry Run' }}
    steps:
      - name: Check if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1

      - name: Update deployment status to Success
        if: ${{ inputs.publish_type != 'Dry Run' && success() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          state: 'success'
          deployment-id: ${{ needs.setup.outputs.deployment-id }}

      - name: Update deployment status to Failure
        if: ${{ inputs.publish_type != 'Dry Run' && failure() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          state: 'failure'
          deployment-id: ${{ needs.setup.outputs.deployment-id }}

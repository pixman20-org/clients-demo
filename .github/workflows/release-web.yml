# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Release Web
run-name: Release Web ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Options'
        required: true
        default: 'Initial Release'
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.version.outputs.version }}
      tag_version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-web" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'rc' or 'hotfix-rc-web' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/web/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=web-v$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - setup
    steps:
      - name: '[MOCK] Download latest build artifacts'
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-web.yml on branch ${{ github.ref_name }}"
          mkdir -p apps/web/artifacts
          VERSION="${{ needs.setup.outputs.release_version }}"
          echo "mock" > apps/web/artifacts/web-${VERSION}-selfhosted-COMMERCIAL.zip
          echo "mock" > apps/web/artifacts/web-${VERSION}-selfhosted-open-source.zip

      - name: '[MOCK] Dry Run - Download latest build artifacts'
        if: ${{ github.event.inputs.release_type == 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-web.yml on branch main"
          mkdir -p apps/web/artifacts
          VERSION="${{ needs.setup.outputs.release_version }}"
          echo "mock" > apps/web/artifacts/web-${VERSION}-selfhosted-COMMERCIAL.zip
          echo "mock" > apps/web/artifacts/web-${VERSION}-selfhosted-open-source.zip

      - name: Rename assets
        working-directory: apps/web/artifacts
        run: |
          mv web-*-selfhosted-COMMERCIAL.zip web-${{ needs.setup.outputs.release_version }}-selfhosted-COMMERCIAL.zip
          mv web-*-selfhosted-open-source.zip web-${{ needs.setup.outputs.release_version }}-selfhosted-open-source.zip

      - name: Create release
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        with:
          name: "Web v${{ needs.setup.outputs.release_version }}"
          commit: ${{ github.sha }}
          tag: web-v${{ needs.setup.outputs.release_version }}
          body: "<insert release notes here>"
          artifacts: |
            apps/web/artifacts/web-${{ needs.setup.outputs.release_version }}-selfhosted-COMMERCIAL.zip,
            apps/web/artifacts/web-${{ needs.setup.outputs.release_version }}-selfhosted-open-source.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

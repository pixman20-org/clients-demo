# Mock workflow: echoes store/registry publishes and signing instead of actually publishing.
# GitHub releases and deployments are real and target pixman20-org repos.
name: Release Desktop
run-name: Release Desktop ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Dry Run

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version.outputs.version }}
      release-channel: ${{ steps.release-channel.outputs.channel }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Branch check
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/rc" ]] && [[ "$GITHUB_REF" != "refs/heads/hotfix-rc-desktop" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'rc' or 'hotfix-rc-desktop' branches"
            echo "==================================="
            exit 1
          fi

      - name: '[MOCK] Check Release Version'
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/desktop/src/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "[MOCK] Release version check: $VERSION"

      - name: Get Version Channel
        id: release-channel
        run: |
          case "${{ steps.version.outputs.version }}" in
            *"alpha"*)
              echo "channel=alpha" >> $GITHUB_OUTPUT
              echo "[!] We do not yet support 'alpha'"
              exit 1
              ;;
            *"beta"*)
              echo "channel=beta" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "channel=latest" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: '[MOCK] Download all artifacts'
        if: ${{ github.event.inputs.release_type != 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-desktop.yml on branch ${{ github.ref_name }}"
          mkdir -p apps/desktop/artifacts
          PKG_VERSION="${{ steps.version.outputs.version }}"
          RELEASE_CHANNEL="${{ steps.release-channel.outputs.channel }}"
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-amd64.deb
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x86_64.rpm
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64.freebsd
          echo "mock" > apps/desktop/artifacts/bitwarden_${PKG_VERSION}_amd64.snap
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x86_64.AppImage
          echo "mock" > apps/desktop/artifacts/Bitwarden-Portable-${PKG_VERSION}.exe
          echo "mock" > apps/desktop/artifacts/Bitwarden-Installer-${PKG_VERSION}.exe
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-ia32-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-ia32.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-ia32.nsis.7z
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-x64.nsis.7z
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-arm64-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-arm64.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-arm64.nsis.7z
          echo "mock" > apps/desktop/artifacts/bitwarden.${PKG_VERSION}.nupkg
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal-mac.zip
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.dmg
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.dmg.blockmap
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.pkg
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}.yml
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}-linux.yml
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}-mac.yml

      - name: '[MOCK] Dry Run - Download all artifacts'
        if: ${{ github.event.inputs.release_type == 'Dry Run' }}
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-desktop.yml on branch main"
          mkdir -p apps/desktop/artifacts
          PKG_VERSION="${{ steps.version.outputs.version }}"
          RELEASE_CHANNEL="${{ steps.release-channel.outputs.channel }}"
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-amd64.deb
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x86_64.rpm
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64.freebsd
          echo "mock" > apps/desktop/artifacts/bitwarden_${PKG_VERSION}_amd64.snap
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x86_64.AppImage
          echo "mock" > apps/desktop/artifacts/Bitwarden-Portable-${PKG_VERSION}.exe
          echo "mock" > apps/desktop/artifacts/Bitwarden-Installer-${PKG_VERSION}.exe
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-ia32-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-ia32.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-ia32.nsis.7z
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-x64.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-x64.nsis.7z
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-arm64-store.appx
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-arm64.appx
          echo "mock" > apps/desktop/artifacts/bitwarden-${PKG_VERSION}-arm64.nsis.7z
          echo "mock" > apps/desktop/artifacts/bitwarden.${PKG_VERSION}.nupkg
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal-mac.zip
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.dmg
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.dmg.blockmap
          echo "mock" > apps/desktop/artifacts/Bitwarden-${PKG_VERSION}-universal.pkg
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}.yml
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}-linux.yml
          echo "mock" > apps/desktop/artifacts/${RELEASE_CHANNEL}-mac.yml

      - name: Rename .pkg to .pkg.archive
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        working-directory: apps/desktop/artifacts
        run: mv Bitwarden-${{ env.PKG_VERSION }}-universal.pkg Bitwarden-${{ env.PKG_VERSION }}-universal.pkg.archive

      - name: '[MOCK] Get checksum files'
        run: |
          echo "[MOCK] Skipping bitwarden/gh-actions/get-checksum"
          echo "mock checksum data" > apps/desktop/artifacts/sha256-checksums.txt

      - name: Create Release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5 # v1.14.0
        if: ${{ steps.release-channel.outputs.channel == 'latest' && github.event.inputs.release_type != 'Dry Run' }}
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_CHANNEL: ${{ steps.release-channel.outputs.channel }}
        with:
          artifacts: |
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-amd64.deb,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-x86_64.rpm,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-x64.freebsd,
            apps/desktop/artifacts/bitwarden_${{ env.PKG_VERSION }}_amd64.snap,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-x86_64.AppImage,
            apps/desktop/artifacts/Bitwarden-Portable-${{ env.PKG_VERSION }}.exe,
            apps/desktop/artifacts/Bitwarden-Installer-${{ env.PKG_VERSION }}.exe,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-ia32-store.appx,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-ia32.appx,
            apps/desktop/artifacts/bitwarden-${{ env.PKG_VERSION }}-ia32.nsis.7z,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-x64-store.appx,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-x64.appx,
            apps/desktop/artifacts/bitwarden-${{ env.PKG_VERSION }}-x64.nsis.7z,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-arm64-store.appx,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-arm64.appx,
            apps/desktop/artifacts/bitwarden-${{ env.PKG_VERSION }}-arm64.nsis.7z,
            apps/desktop/artifacts/bitwarden.${{ env.PKG_VERSION }}.nupkg,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-universal-mac.zip,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-universal.dmg,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-universal.dmg.blockmap,
            apps/desktop/artifacts/Bitwarden-${{ env.PKG_VERSION }}-universal.pkg.archive,
            apps/desktop/artifacts/${{ env.RELEASE_CHANNEL }}.yml,
            apps/desktop/artifacts/${{ env.RELEASE_CHANNEL }}-linux.yml,
            apps/desktop/artifacts/${{ env.RELEASE_CHANNEL }}-mac.yml,
            apps/desktop/artifacts/sha256-checksums.txt
          commit: ${{ github.sha }}
          tag: desktop-v${{ env.PKG_VERSION }}
          name: Desktop v${{ env.PKG_VERSION }}
          body: "<insert release notes here>"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

# Mock workflow: echoes Rust/Electron builds, macOS signing/notarization/TestFlight, Windows signing,
# Linux packaging (snap/flatpak), and artifact validation instead of actually building.
# MOCK: all macOS (macos-15), Windows (windows-2022), and ARM (ubuntu-22.04-arm) runners
# have been replaced with ubuntu-24.04.

name: Build Desktop

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'l10n_master'
      - 'cf-pages'
    paths:
      - 'apps/desktop/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  push:
    branches:
      - 'main'
      - 'rc'
      - 'hotfix-rc-desktop'
    paths:
      - 'apps/desktop/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  workflow_call:
    inputs: {}
  workflow_dispatch:
    inputs:
      sdk_branch:
        description: "Custom SDK branch"
        required: false
        type: string
      testflight_distribute:
        description: "Force distribute to TestFlight regardless of branch (useful for QA testing on feature branches)"
        type: boolean
        default: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  electron-verify:
    name: Verify Electron Version
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify
        run: |
          PACKAGE_VERSION=$(jq -r .devDependencies.electron package.json)
          ELECTRON_BUILDER_VERSION=$(jq -r .electronVersion ./apps/desktop/electron-builder.json)

          if [[ "$PACKAGE_VERSION" == "$ELECTRON_BUILDER_VERSION" ]]; then
            echo "Versions match"
          else
            echo "Version mismatch, package.json: $PACKAGE_VERSION, electron-builder.json: $ELECTRON_BUILDER_VERSION"
            exit 1
          fi


  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      package_version: ${{ steps.retrieve-version.outputs.package_version }}
      release_channel: ${{ steps.release-channel.outputs.channel }}
      build_number: ${{ steps.increment-version.outputs.build_number }}
      rc_branch_exists: ${{ steps.branch-check.outputs.rc_branch_exists }}
      hotfix_branch_exists: ${{ steps.branch-check.outputs.hotfix_branch_exists }}
      node_version: ${{ steps.retrieve-node-version.outputs.node_version }}
      has_secrets: ${{ steps.check-secrets.outputs.has_secrets }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - name: Get Package Version
        id: retrieve-version
        run: |
          PKG_VERSION=$(jq -r .version src/package.json)
          echo "Setting version number to $PKG_VERSION"
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Increment Version
        id: increment-version
        run: |
          BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          echo "Setting build number to $BUILD_NUMBER"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get Version Channel
        id: release-channel
        env:
          _PACKAGE_VERSION: ${{ steps.retrieve-version.outputs.package_version }}
        run: |
          case "$_PACKAGE_VERSION" in
            *"alpha"*)
              echo "channel=alpha" >> "$GITHUB_OUTPUT"
              echo "[!] We do not yet support 'alpha'"
              exit 1
              ;;
            *"beta"*)
              echo "channel=beta" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "channel=latest" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Check if special branches exist
        id: branch-check
        run: |
          if [[ $(git ls-remote --heads origin rc) ]]; then
            echo "rc_branch_exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "rc_branch_exists=0" >> "$GITHUB_OUTPUT"
          fi

          if [[ $(git ls-remote --heads origin hotfix-rc-desktop) ]]; then
            echo "hotfix_branch_exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "hotfix_branch_exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Node Version
        id: retrieve-node-version
        working-directory: ./
        run: |
          NODE_NVMRC=$(cat .nvmrc 2>/dev/null || echo "20")
          NODE_VERSION=${NODE_NVMRC/v/''}
          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check secrets
        id: check-secrets
        run: |
          has_secrets=${{ secrets.DEMO_CLIENT_ID != '' }}
          echo "has_secrets=$has_secrets" >> "$GITHUB_OUTPUT"


  linux:
    name: Linux Build
    runs-on: ubuntu-24.04
    needs: setup
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: "[MOCK] Download SDK Artifacts"
        if: ${{ inputs.sdk_branch != '' }}
        run: echo "[MOCK] Would download sdk-internal from sdk-internal repo branch - ${{ inputs.sdk_branch }}"

      - name: "[MOCK] Build Native Rust Module"
        run: echo "[MOCK] Would run node build.js --target=x86_64-unknown-linux-gnu --release"

      - name: "[MOCK] Build application (dist:lin)"
        run: |
          echo "[MOCK] Would run npm run dist:lin"
          mkdir -p dist
          echo "mock linux build" > dist/bitwarden_desktop_x64.tar.gz
          echo "mock deb" > dist/Bitwarden-${_PACKAGE_VERSION}-amd64.deb
          echo "mock rpm" > dist/Bitwarden-${_PACKAGE_VERSION}-x86_64.rpm
          echo "mock snap" > dist/bitwarden_${_PACKAGE_VERSION}_amd64.snap
          echo "mock appimage" > dist/Bitwarden-${_PACKAGE_VERSION}-x86_64.AppImage
          echo "mock" > dist/latest-linux.yml
          echo "mock flatpak" > dist/com.bitwarden.desktop.flatpak

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: bitwarden_${{ env._PACKAGE_VERSION }}_x64.tar.gz
          path: apps/desktop/dist/bitwarden_desktop_x64.tar.gz
          if-no-files-found: error

      - name: Upload .deb artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-amd64.deb
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-amd64.deb
          if-no-files-found: error

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-x86_64.rpm
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-x86_64.rpm
          if-no-files-found: error

      - name: Upload .snap artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: bitwarden_${{ env._PACKAGE_VERSION }}_amd64.snap
          path: apps/desktop/dist/bitwarden_${{ env._PACKAGE_VERSION }}_amd64.snap
          if-no-files-found: error

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-x86_64.AppImage
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-x86_64.AppImage
          if-no-files-found: error

      - name: Upload auto-update artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: ${{ needs.setup.outputs.release_channel }}-linux.yml
          path: apps/desktop/dist/latest-linux.yml
          if-no-files-found: error

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: com.bitwarden.desktop.flatpak
          path: apps/desktop/dist/com.bitwarden.desktop.flatpak
          if-no-files-found: error


  linux-arm64:
    name: Linux ARM64 Build
    # MOCK: changed from ubuntu-22.04-arm to ubuntu-24.04
    runs-on: ubuntu-24.04
    needs: setup
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: "[MOCK] Download SDK Artifacts"
        if: ${{ inputs.sdk_branch != '' }}
        run: echo "[MOCK] Would download sdk-internal from sdk-internal repo branch - ${{ inputs.sdk_branch }}"

      - name: "[MOCK] Build Native Rust Module (ARM64)"
        run: echo "[MOCK] Would run node build.js --target=aarch64-unknown-linux-gnu --release"

      - name: "[MOCK] Build application (dist:lin:arm64)"
        run: |
          echo "[MOCK] Would run npm run dist:lin:arm64"
          mkdir -p dist
          echo "mock arm64 snap" > dist/bitwarden_${_PACKAGE_VERSION}_arm64.snap
          echo "mock arm64 tar" > dist/bitwarden_desktop_arm64.tar.gz
          echo "mock arm64 flatpak" > dist/com.bitwarden.desktop.flatpak

      - name: Upload .snap artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: bitwarden_${{ env._PACKAGE_VERSION }}_arm64.snap
          path: apps/desktop/dist/bitwarden_${{ env._PACKAGE_VERSION }}_arm64.snap
          if-no-files-found: error

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: bitwarden_${{ env._PACKAGE_VERSION }}_arm64.tar.gz
          path: apps/desktop/dist/bitwarden_desktop_arm64.tar.gz
          if-no-files-found: error

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: com.bitwarden.desktop-arm64.flatpak
          path: apps/desktop/dist/com.bitwarden.desktop.flatpak
          if-no-files-found: error


  windows:
    name: Windows Build
    # MOCK: changed from windows-2022 to ubuntu-24.04; all Windows/signing steps are echoed
    runs-on: ubuntu-24.04
    needs:
      - setup
    permissions:
      contents: read
      id-token: write
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: "[MOCK] Log in to Azure"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log in to Azure with OIDC"

      - name: "[MOCK] Retrieve code signing secrets"
        id: retrieve-secrets
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: |
          echo "[MOCK] Would retrieve code-signing-* secrets from demo-kv-ci"
          echo "code-signing-vault-url=mock" >> "$GITHUB_OUTPUT"
          echo "code-signing-cert-name=mock" >> "$GITHUB_OUTPUT"

      - name: "[MOCK] Log out from Azure"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would log out from Azure"

      - name: "[MOCK] Download SDK Artifacts"
        if: ${{ inputs.sdk_branch != '' && needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would download sdk-internal from sdk-internal repo branch - ${{ inputs.sdk_branch }}"

      - name: "[MOCK] Build Native Rust Module (Windows)"
        run: echo "[MOCK] Would run node build.js cross-platform"

      - name: "[MOCK] Build & Pack Windows"
        run: |
          echo "[MOCK] Would run npm run build && npm run pack:win"
          mkdir -p dist/nsis-web
          echo "mock portable" > dist/Bitwarden-Portable-${_PACKAGE_VERSION}.exe
          echo "mock installer" > dist/nsis-web/Bitwarden-Installer-${_PACKAGE_VERSION}.exe
          for arch in ia32 x64 arm64; do
            echo "mock appx" > dist/Bitwarden-${_PACKAGE_VERSION}-${arch}.appx
            echo "mock appx store" > dist/Bitwarden-${_PACKAGE_VERSION}-${arch}-store.appx
            echo "mock nsis" > dist/nsis-web/bitwarden-${_PACKAGE_VERSION}-${arch}.nsis.7z
          done
          echo "mock latest.yml" > dist/nsis-web/latest.yml
          echo "mock nupkg" > dist/chocolatey/bitwarden.${_PACKAGE_VERSION}.nupkg

      - name: "[MOCK] Sign executable"
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        run: echo "[MOCK] Would sign executables with AzureSignTool"

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-Portable-${{ env._PACKAGE_VERSION }}.exe
          path: apps/desktop/dist/Bitwarden-Portable-${{ env._PACKAGE_VERSION }}.exe
          if-no-files-found: error

      - name: Upload installer exe artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-Installer-${{ env._PACKAGE_VERSION }}.exe
          path: apps/desktop/dist/nsis-web/Bitwarden-Installer-${{ env._PACKAGE_VERSION }}.exe
          if-no-files-found: error

      - name: Upload appx ia32 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-ia32.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-ia32.appx
          if-no-files-found: error

      - name: Upload store appx ia32 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-ia32-store.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-ia32-store.appx
          if-no-files-found: error

      - name: Upload appx x64 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-x64.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-x64.appx
          if-no-files-found: error

      - name: Upload store appx x64 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-x64-store.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-x64-store.appx
          if-no-files-found: error

      - name: Upload appx ARM64 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-arm64.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-arm64.appx
          if-no-files-found: error

      - name: Upload store appx ARM64 artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-arm64-store.appx
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-arm64-store.appx
          if-no-files-found: error

      - name: Upload nupkg artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: bitwarden.${{ env._PACKAGE_VERSION }}.nupkg
          path: apps/desktop/dist/chocolatey/bitwarden.${{ env._PACKAGE_VERSION }}.nupkg
          if-no-files-found: error

      - name: Upload auto-update artifact
        if: ${{ needs.setup.outputs.has_secrets == 'true' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.1
        with:
          name: ${{ needs.setup.outputs.release_channel }}.yml
          path: apps/desktop/dist/nsis-web/latest.yml
          if-no-files-found: error


  windows-beta:

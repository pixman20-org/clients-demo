          node-version: ${{ env._NODE_VERSION }}

      - name: Print environment
        run: |
          node --version
          npm --version
          echo "GitHub ref: $GITHUB_REF"
          echo "GitHub event: $GITHUB_EVENT"

      - name: '[MOCK] Download Provisioning Profiles secrets'
        run: echo "[MOCK] Skipping az storage blob download for provisioning profiles"

      - name: '[MOCK] Get certificates'
        run: echo "[MOCK] Skipping az keyvault secret show for signing certificates"

      - name: '[MOCK] Set up keychain'
        run: echo "[MOCK] Skipping macOS keychain setup (no signing infrastructure)"

      - name: '[MOCK] Set up provisioning profiles'
        run: echo "[MOCK] Skipping provisioning profile setup"

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: '[MOCK] Download artifact from hotfix-rc'
        if: github.ref == 'refs/heads/hotfix-rc'
        run: echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-browser.yml on branch hotfix-rc"

      - name: '[MOCK] Download artifact from rc'
        if: github.ref == 'refs/heads/rc'
        run: echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-browser.yml on branch rc"

      - name: '[MOCK] Download artifact from main'
        if: ${{ github.ref != 'refs/heads/rc' && github.ref != 'refs/heads/hotfix-rc' }}
        run: echo "[MOCK] Skipping bitwarden/gh-actions/download-artifacts for build-browser.yml on branch main"

      - name: '[MOCK] Build application for App Store'
        run: |
          echo "[MOCK] Skipping npm run pack:mac:mas (no macOS/App Store signing infrastructure)"
          mkdir -p dist/mas-universal
          echo "mock" > dist/mas-universal/Bitwarden-${{ env._PACKAGE_VERSION }}-universal.pkg

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.pkg
          path: apps/desktop/dist/mas-universal/Bitwarden-${{ env._PACKAGE_VERSION }}-universal.pkg
          if-no-files-found: error

  release:
    name: Release beta channel to S3
    runs-on: ubuntu-24.04
    needs:
      - setup
      - linux
      - windows
      - macos-build
      - macos-package-github
      - macos-package-mas
    steps:
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@55729fcebec3d284f60f5bcabbd8376437d696b1 # v2.0.7
        id: deployment
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          initial-status: 'in_progress'
          environment: 'Desktop - Beta'
          description: 'Deployment ${{ needs.setup.outputs.release-version }} to channel ${{ needs.setup.outputs.release-channel }} from branch ${{ needs.setup.outputs.branch-name }}'
          task: release

      - name: '[MOCK] Login to Azure'
        run: echo "[MOCK] Skipping Azure login (no real credentials)"

      - name: '[MOCK] Retrieve secrets'
        id: retrieve-secrets
        run: echo "[MOCK] Skipping secret retrieval from Azure Key Vault (aws-electron-access-id, aws-electron-access-key, aws-electron-bucket-name)"

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: apps/desktop/artifacts

      - name: Rename .pkg to .pkg.archive
        env:
          PKG_VERSION: ${{ needs.setup.outputs.release-version }}
        working-directory: apps/desktop/artifacts
        run: mv Bitwarden-${{ env.PKG_VERSION }}-universal.pkg Bitwarden-${{ env.PKG_VERSION }}-universal.pkg.archive

      - name: '[MOCK] Publish artifacts to S3'
        run: echo "[MOCK] aws s3 cp ./ <bucket>/desktop/ --acl public-read --recursive --quiet"

      - name: Update deployment status to Success
        if: ${{ success() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update deployment status to Failure
        if: ${{ failure() }}
        uses: chrnorm/deployment-status@9a72af4586197112e0491ea843682b5dc280d806 # v2.0.3
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

  remove-branch:
    name: Remove branch
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - setup
      - linux
      - windows
      - macos-build
      - macos-package-github
      - macos-package-mas
      - release
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup git config
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://".insteadOf ssh://

      - name: Remove branch
        env:
          BRANCH: ${{ needs.setup.outputs.branch-name }}
        run: git push origin --delete $BRANCH
